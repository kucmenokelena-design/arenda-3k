<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arenda 3D: The Glitch Room</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; }
        #clock { font-size: 24px; color: #f00; text-shadow: 0 0 5px #000; }
        #alert { font-size: 18px; color: yellow; background: rgba(0,0,0,0.5); display: none; }
        
        #instructions { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 500; }
        #paper { background: #e0d8c0; padding: 25px; width: 85%; max-width: 400px; border: 3px solid #333; color: #000; }
        
        #move-zone { position: fixed; bottom: 0; left: 0; width: 50%; height: 80%; z-index: 20; }
        #look-zone { position: fixed; bottom: 0; right: 0; width: 50%; height: 100%; z-index: 10; }
        #joy-bound { position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #fff; border-radius: 50%; }

        .btn { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); padding: 20px; background: #800; color: white; border: 2px solid #fff; display: none; z-index: 150; font-weight: bold; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="instructions">
        <div id="paper">
            <h2 style="text-align:center">ИНСТРУКЦИЯ</h2>
            <p>• <b>Свет погас:</b> У тебя 20 сек, чтобы дойти до ЩИТКА (желтый).</p>
            <p>• <b>ТВ включился / Стук:</b> Быстро прячься в ШКАФ (коричневый) на 10 секунд.</p>
            <p>• <b>Цель:</b> Дожить до 03:00 AM (3 минуты).</p>
            <button onclick="startGame()" style="width:100%; padding:15px; background:#222; color:#fff; border:none;">НАЧАТЬ ВЫЖИВАНИЕ</button>
        </div>
    </div>

    <div id="ui">
        <div id="clock">12:00 AM</div>
        <div id="alert">ЧТО-ТО ПРОИСХОДИТ...</div>
    </div>

    <div id="move-zone"><div id="joy-bound"><div id="joy-stick"></div></div></div>
    <div id="look-zone"></div>

    <button id="action-btn" class="btn">ДЕЙСТВИЕ</button>

    <div id="overlay">
        <h1 id="over-title">ГЛИЧ НАШЕЛ ТЕБЯ</h1>
        <button onclick="location.reload()" style="padding:15px 30px; background:#fff; color:#000; border:none;">ПОПРОБОВАТЬ СНОВА</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mainLight, backupLight, monster;
        let isMoving = false, isHidden = false, isBlackout = false, gameActive = false;
        let moveJoy = {x:0, y:0}, rotY = 0, rotX = 0;
        let timeLeft = 180, objects = {}, activeAnomaly = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x151515);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            mainLight = new THREE.PointLight(0xffffff, 1.5, 30);
            mainLight.position.set(0, 5, 0); scene.add(mainLight);
            backupLight = new THREE.PointLight(0xff0000, 0, 15); scene.add(backupLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));

            const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), new THREE.MeshPhongMaterial({color: 0x444444, side: THREE.BackSide}));
            scene.add(room);

            function createObj(w,h,d, x,y,z, col, name) {
                let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color: col}));
                m.position.set(x,y,z); scene.add(m); objects[name] = m;
            }

            createObj(1.5, 4, 1.2, 4, -1, 0, 0x3d2b1f, 'ШКАФ');
            createObj(1.2, 0.8, 0.2, 0, 0, -4.9, 0x111111, 'ТЕЛЕВИЗОР');
            createObj(0.4, 0.6, 0.1, -4.9, 1, 0, 0xffff00, 'ЩИТОК');
            createObj(1.5, 3.5, 0.1, 0, -1, 4.9, 0x221100, 'ДВЕРЬ');
            createObj(2, 1.5, 0.1, -4.9, 1, -3, 0x88ccff, 'ОКНО');

            monster = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true}));
            monster.position.set(0, -10, 0); scene.add(monster);

            camera.position.set(0, 0, 2);
            animate();
        }

        function startGame() {
            document.getElementById('instructions').style.display = 'none';
            gameActive = true;
            init();
            startTimer();
            setInterval(randomAnomaly, 15000);
        }

        function startTimer() {
            let t = setInterval(() => {
                if(!gameActive) return clearInterval(t);
                timeLeft--;
                let h = 12 + Math.floor((180 - timeLeft) / 60);
                if(h > 12) h -= 12;
                document.getElementById('clock').innerText = `${h}:00 AM`;
                if(timeLeft <= 0) winGame();
            }, 1000);
        }

        function randomAnomaly() {
            if(!gameActive || activeAnomaly) return;
            let r = Math.random();
            activeAnomaly = true;
            let alertBox = document.getElementById('alert');
            alertBox.style.display = 'block';

            if(r < 0.3) { // СВЕТ
                alertBox.innerText = "СВЕТ ВЫРУБИЛСЯ! ЩИТОК!";
                isBlackout = true; mainLight.intensity = 0; backupLight.intensity = 1.2;
                setTimeout(() => { if(isBlackout) die("ТЫ НЕ ПОЧИНИЛ СВЕТ"); }, 20000);
            } else { // ТВ или СТУК
                alertBox.innerText = r < 0.6 ? "КТО-ТО СТУЧИТ... В ШКАФ!" : "ТВ ВКЛЮЧИЛСЯ... В ШКАФ!";
                if(r >= 0.6) objects['ТЕЛЕВИЗОР'].material.color.set(0xffffff);
                setTimeout(() => {
                    if(!isHidden) die("ГЛИЧ НАШЕЛ ТЕБЯ");
                    else { 
                        alertBox.style.display = 'none'; activeAnomaly = false;
                        objects['ТЕЛЕВИЗОР'].material.color.set(0x111111);
                    }
                }, 10000);
            }
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            if(!isHidden) {
                // ИСПРАВЛЕННЫЙ ВЕКТОР ДВИЖЕНИЯ
                let moveX = (Math.sin(rotY) * moveJoy.y + Math.cos(rotY) * moveJoy.x) * 0.08;
                let moveZ = (Math.cos(rotY) * moveJoy.y - Math.sin(rotY) * moveJoy.x) * 0.08;
                camera.position.x -= moveX;
                camera.position.z -= moveZ;
            }

            camera.position.x = Math.max(-4, Math.min(4, camera.position.x));
            camera.position.z = Math.max(-4, Math.min(4, camera.position.z));

            let btn = document.getElementById('action-btn');
            btn.style.display = 'none';

            for(let name in objects) {
                if(camera.position.distanceTo(objects[name].position) < 2) {
                    if(name === 'ШКАФ' && !isHidden) {
                        btn.style.display = 'block'; btn.innerText = "ЗАЛЕЗТЬ В ШКАФ";
                        btn.onclick = () => { isHidden = true; camera.position.set(3.8, -1, 0); };
                    }
                    if(name === 'ЩИТОК' && isBlackout) {
                        btn.style.display = 'block'; btn.innerText = "ПОЧИНИТЬ ЩИТОК";
                        btn.onclick = () => { isBlackout = false; activeAnomaly = false; mainLight.intensity = 1.5; backupLight.intensity = 0; document.getElementById('alert').style.display = 'none'; };
                    }
                }
            }
            if(isHidden) {
                btn.style.display = 'block'; btn.innerText = "ВЫЙТИ";
                btn.onclick = () => { isHidden = false; camera.position.set(2, 0, 0); };
            }

            camera.rotation.set(rotX, rotY, 0);
            backupLight.position.copy(camera.position);
            renderer.render(scene, camera);
        }

        // УПРАВЛЕНИЕ (ВРАЩЕНИЕ)
        let lastX, lastY;
        document.getElementById('look-zone').ontouchmove = (e) => {
            let t = e.touches[0];
            if(lastX) {
                rotY -= (t.clientX - lastX) * 0.006;
                rotX -= (t.clientY - lastY) * 0.006;
                rotX = Math.max(-1.2, Math.min(1.2, rotX));
            }
            lastX = t.clientX; lastY = t.clientY;
        };
        document.getElementById('look-zone').ontouchend = () => { lastX = null; };

        // ДЖОЙСТИК (ДВИЖЕНИЕ)
        const jBound = document.getElementById('joy-bound');
        const jStick = document.getElementById('joy-stick');
        document.getElementById('move-zone').ontouchstart = (e) => {
            jBound.style.display = 'block';
            jBound.style.left = e.touches[0].clientX - 40 + 'px';
            jBound.style.top = e.touches[0].clientY - 40 + 'px';
        };
        document.getElementById('move-zone').ontouchmove = (e) => {
            let t = e.touches[0], rect = jBound.getBoundingClientRect();
            let dx = (t.clientX - (rect.left + 40))/40, dy = (t.clientY - (rect.top + 40))/40;
            let d = Math.sqrt(dx*dx+dy*dy); if(d>1){dx/=d;dy/=d;}
            jStick.style.transform = `translate(${dx*20}px,${dy*20}px)`;
            moveJoy = {x:dx, y:dy};
        };
        document.getElementById('move-zone').ontouchend = () => { jBound.style.display='none'; moveJoy={x:0,y:0}; };

        function die(msg) {
            gameActive = false;
            // Скример звук (простой бип)
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('over-title').innerText = msg;
        }

        function winGame() {
            gameActive = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('over-title').innerText = "ПОЗДРАВЛЯЕМ! ТЫ ВЫЖИЛ!";
            document.getElementById('over-title').style.color = "lime";
        }
    </script>
</body>
</html>
