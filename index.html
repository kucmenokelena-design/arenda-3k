<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arenda 3D: The Glitch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #vision {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 15%, rgba(0,0,0,0.98) 75%);
            pointer-events: none; display: none; z-index: 10;
        }
        #rules-overlay, #death-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,1); display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        #paper { background: #e0d8c0; padding: 20px; width: 85%; max-width: 400px; border: 2px solid #555; box-shadow: 10px 10px 0px #222; }
        h2 { color: #800; text-align: center; }
        p { font-size: 14px; color: #111; line-height: 1.3; }
        button { width: 100%; padding: 15px; background: #800; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #joy-bound { position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 20; border: 1px solid #fff2; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,0,0,0.3); border-radius: 50%; }
        
        #glitch-text { position: fixed; top: 40%; width: 100%; text-align: center; color: white; font-size: 18px; display: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="rules-overlay">
        <div id="paper">
            <h2>ПРАВИЛА ВЫЖИВАНИЯ</h2>
            <p>1. Включился ТВ? БЕГИ В ШКАФ, иначе выйдет Глич.</p>
            <p>2. Стук в окно? НЕ СМОТРИ ТУДА, или окно выбьют.</p>
            <p>3. Сосед (Глич) стучит в дверь? У тебя 5 секунд, чтобы спрятаться в шкафу.</p>
            <p>4. Если Глич идет за тобой — не пытайся просто убежать, он станет быстрее.</p>
            <button id="start-btn">Я ПРИНИМАЮ СМЕРТЬ</button>
        </div>
    </div>

    <div id="death-screen" style="display:none; background: #000; flex-direction: column;">
        <h1 style="color: #600; font-size: 14px;" id="death-msg">...</h1>
        <button onclick="location.reload()" style="width: auto; padding: 10px 40px;">НАЧАТЬ ЗАНОВО</button>
    </div>

    <div id="glitch-text">You will die...</div>
    <div id="vision"></div>
    <div id="joy-bound"><div id="joy-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, light, monster, tv;
        let joyPos = {x:0, y:0}, isMoving = false, gameActive = false;
        let monsterSpeed = 0.02;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.05);
            scene.add(ambient);
            light = new THREE.PointLight(0xff0000, 1.5, 10);
            scene.add(light);

            // МИР
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshPhongMaterial({color:0x111111}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            // ТЕЛЕВИЗОР
            const tvGeo = new THREE.BoxGeometry(2, 1.5, 0.5);
            const tvMat = new THREE.MeshPhongMaterial({color: 0x222222});
            tv = new THREE.Mesh(tvGeo, tvMat);
            tv.position.set(0, 1, -8);
            scene.add(tv);

            // ШКАФ (Зона безопасности)
            const closet = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 1), new THREE.MeshPhongMaterial({color: 0x221100}));
            closet.position.set(5, 1.5, -2);
            scene.add(closet);

            // МОНСТР (Глич)
            const mGeo = new THREE.BoxGeometry(0.8, 1.8, 0.3);
            const mMat = new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true});
            monster = new THREE.Mesh(mGeo, mMat);
            monster.position.set(0, -5, -8); // Спрятан под полом
            scene.add(monster);

            camera.position.set(0, 1.7, 2);
            animate();
            
            // Через 5 секунд ТВ "включается" и Глич выходит
            setTimeout(spawnMonster, 5000);
        }

        function spawnMonster() {
            if(!gameActive) return;
            monster.position.y = 1;
            document.getElementById('glitch-text').style.display = 'block';
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            // Движение игрока
            if (isMoving) {
                camera.position.x += joyPos.x * 0.1;
                camera.position.z += joyPos.y * 0.1;
            }

            // Логика монстра
            if(monster.position.y > 0) {
                let dist = camera.position.distanceTo(monster.position);
                // Если игрок далеко, монстр ускоряется
                let speedBoost = dist > 5 ? 0.005 : 0;
                monsterSpeed += speedBoost;
                
                monster.lookAt(camera.position);
                monster.translateZ(monsterSpeed);

                // Если поймал
                if(dist < 1.2) {
                    gameOver();
                }
            }

            light.position.copy(camera.position);
            renderer.render(scene, camera);
        }

        function gameOver() {
            gameActive = false;
            document.body.style.filter = "invert(1) contrast(200%)"; // Глич-эффект
            setTimeout(() => {
                document.getElementById('death-screen').style.display = 'flex';
                document.getElementById('death-msg').innerText = "ДЛЯ НЕГО ТЫ ПРОСТО ТУПАЯ ИГРУШКА";
                document.body.style.filter = "none";
            }, 500);
        }

        // Джойстик (как в прошлом коде)
        const jBound = document.getElementById('joy-bound');
        const jStick = document.getElementById('joy-stick');
        jBound.addEventListener('touchstart', () => isMoving = true);
        jBound.addEventListener('touchmove', (e) => {
            const rect = jBound.getBoundingClientRect();
            const t = e.touches[0];
            let dx = (t.clientX - rect.left - 50) / 50;
            let dy = (t.clientY - rect.top - 50) / 50;
            jStick.style.transform = `translate(${dx*30}px, ${dy*30}px)`;
            joyPos.x = dx; joyPos.y = dy;
        });
        jBound.addEventListener('touchend', () => { isMoving = false; jStick.style.transform = 'translate(0,0)'; });

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('rules-overlay').style.display = 'none';
            document.getElementById('vision').style.display = 'block';
            jBound.style.display = 'block';
            gameActive = true;
            init();
        };
    </script>
</body>
</html>
