<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arenda 3D: Light & Closet</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Надписи на экране */
        #info-layer { position: fixed; top: 20px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; }
        #object-name { font-size: 24px; color: yellow; font-weight: bold; margin-top: 10px; text-shadow: 2px 2px 5px black; }
        #timer-text { font-size: 18px; color: red; display: none; }

        /* Управление */
        #move-zone { position: fixed; bottom: 0; left: 0; width: 50%; height: 100%; z-index: 20; }
        #look-zone { position: fixed; bottom: 0; right: 0; width: 50%; height: 100%; z-index: 10; }
        #joy-bound { position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #fff; border-radius: 50%; }

        /* Кнопки */
        .btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #800; color: white; border: 2px solid #fff; display: none; z-index: 150; border-radius: 10px; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; color: white; }
    </style>
</head>
<body>

    <div id="info-layer">
        <div id="timer-text">РЕЗЕРВНЫЙ СВЕТ: 10 СЕК!</div>
        <div id="object-name">Осматривайтесь...</div>
    </div>

    <div id="move-zone"><div id="joy-bound"><div id="joy-stick"></div></div></div>
    <div id="look-zone"></div>

    <button id="action-btn" class="btn">ДЕЙСТВИЕ</button>

    <div id="overlay">
        <h1 id="over-title">КОНЕЦ ИГРЫ</h1>
        <button onclick="location.reload()" style="padding: 10px 20px;">ИГРАТЬ СНОВА</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mainLight, backupLight, monster;
        let isMoving = false, isHidden = false, isBlackout = false, gameActive = true;
        let moveJoy = {x:0, y:0}, rotY = 0, rotX = 0;
        let objects = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333); // Теперь не темно!

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // СВЕТ (Сразу светло)
            mainLight = new THREE.PointLight(0xffffff, 1.5, 30);
            mainLight.position.set(0, 5, 0);
            scene.add(mainLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            backupLight = new THREE.PointLight(0xff0000, 0, 15);
            scene.add(backupLight);

            // КОМНАТА
            const roomGeo = new THREE.BoxGeometry(10, 6, 10);
            const roomMat = new THREE.MeshPhongMaterial({color: 0x888888, side: THREE.BackSide});
            scene.add(new THREE.Mesh(roomGeo, roomMat));

            // ПОЛ
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.MeshPhongMaterial({color: 0x444444}));
            floor.rotation.x = -Math.PI/2; floor.position.y = -3;
            scene.add(floor);

            // ПРЕДМЕТЫ
            function createObj(w,h,d, x,y,z, col, name) {
                let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color: col}));
                m.position.set(x,y,z); scene.add(m); objects[name] = m;
            }

            createObj(1.5, 4, 1.2, 4, -1, 0, 0x3d2b1f, 'ШКАФ'); // Большой коричневый шкаф
            createObj(1.2, 0.8, 0.1, 0, 0, -4.9, 0x111111, 'ТЕЛЕВИЗОР');
            createObj(0.4, 0.6, 0.1, -4.9, 1, 0, 0xffff00, 'ЩИТОК');

            // МОНСТР (Глич) - спрятан до поры
            monster = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.2), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true}));
            monster.position.set(0, -10, 0); scene.add(monster);

            camera.position.set(0, 0, 3);
            animate();
            setInterval(randomEvent, 15000);
        }

        function randomEvent() {
            if(!gameActive || isBlackout || isHidden) return;
            if(Math.random() < 0.5) triggerBlackout();
        }

        function triggerBlackout() {
            isBlackout = true;
            mainLight.intensity = 0;
            backupLight.intensity = 1.5;
            document.getElementById('timer-text').style.display = 'block';
            setTimeout(() => { if(isBlackout) endGame("СВЕТ ВЫРУБИЛСЯ НАВСЕГДА..."); }, 10000);
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            if(!isHidden) {
                let dirX = Math.sin(rotY) * moveJoy.y + Math.cos(rotY) * moveJoy.x;
                let dirZ = Math.cos(rotY) * moveJoy.y - Math.sin(rotY) * moveJoy.x;
                camera.position.x -= dirX * 0.08;
                camera.position.z -= dirZ * 0.08;
            }

            // Ограничение стен
            camera.position.x = Math.max(-4.5, Math.min(4.5, camera.position.x));
            camera.position.z = Math.max(-4.5, Math.min(4.5, camera.position.z));

            // Проверка предметов
            let found = "Осматривайтесь...";
            let btn = document.getElementById('action-btn');
            btn.style.display = 'none';

            for(let name in objects) {
                if(camera.position.distanceTo(objects[name].position) < 2) {
                    found = "ЭТО " + name;
                    if(name === 'ШКАФ' && !isHidden) {
                        btn.style.display = 'block'; btn.innerText = "ЗАЛЕЗТЬ В ШКАФ";
                        btn.onclick = () => { isHidden = true; camera.position.set(3.8, -1, 0); };
                    }
                    if(name === 'ЩИТОК' && isBlackout) {
                        btn.style.display = 'block'; btn.innerText = "ПОЧИНИТЬ СВЕТ";
                        btn.onclick = () => { isBlackout = false; mainLight.intensity = 1.5; backupLight.intensity = 0; document.getElementById('timer-text').style.display = 'none'; };
                    }
                }
            }
            if(isHidden) {
                found = "ВЫ В ШКАФУ";
                btn.style.display = 'block'; btn.innerText = "ВЫЙТИ";
                btn.onclick = () => { isHidden = false; camera.position.set(3, 0, 0); };
            }

            document.getElementById('object-name').innerText = found;
            camera.rotation.set(rotX, rotY, 0);
            backupLight.position.copy(camera.position);
            renderer.render(scene, camera);
        }

        // ВРАЩЕНИЕ КАМЕРЫ (Право)
        let lastX, lastY;
        document.getElementById('look-zone').ontouchmove = (e) => {
            let t = e.touches[0];
            if(lastX) {
                rotY -= (t.clientX - lastX) * 0.007;
                rotX -= (t.clientY - lastY) * 0.007;
                rotX = Math.max(-1.4, Math.min(1.4, rotX));
            }
            lastX = t.clientX; lastY = t.clientY;
        };
        document.getElementById('look-zone').ontouchend = () => { lastX = null; };

        // ДЖОЙСТИК (Лево)
        const jBound = document.getElementById('joy-bound');
        const jStick = document.getElementById('joy-stick');
        document.getElementById('move-zone').ontouchstart = (e) => {
            jBound.style.display = 'block';
            jBound.style.left = e.touches[0].clientX - 40 + 'px';
            jBound.style.top = e.touches[0].clientY - 40 + 'px';
        };
        document.getElementById('move-zone').ontouchmove = (e) => {
            let t = e.touches[0], rect = jBound.getBoundingClientRect();
            let dx = (t.clientX - (rect.left + 40))/40, dy = (t.clientY - (rect.top + 40))/40;
            let d = Math.sqrt(dx*dx+dy*dy); if(d>1){dx/=d;dy/=d;}
            jStick.style.transform = `translate(${dx*20}px,${dy*20}px)`;
            moveJoy = {x:dx, y:dy};
        };
        document.getElementById('move-zone').ontouchend = () => { jBound.style.display='none'; moveJoy={x:0,y:0}; };

        function endGame(m) { gameActive = false; document.getElementById('overlay').style.display='flex'; alert(m); }

        init();
    </script>
</body>
</html>
