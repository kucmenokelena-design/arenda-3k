<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arenda 3D: Survival</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; }
        #clock { font-size: 26px; color: #f00; font-weight: bold; }
        #alert { font-size: 20px; color: yellow; background: rgba(255,0,0,0.7); display: none; padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: bold; }
        
        #closet-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: repeating-linear-gradient(to bottom, transparent, transparent 30px, rgba(0,0,0,0.95) 30px, rgba(0,0,0,0.95) 60px); 
            display: none; z-index: 80; pointer-events: none; border: 15px solid #2a1b10; }

        #move-zone { position: fixed; bottom: 0; left: 0; width: 50%; height: 100%; z-index: 20; }
        #look-zone { position: fixed; bottom: 0; right: 0; width: 50%; height: 100%; z-index: 10; }
        #joy-bound { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; }

        .btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); padding: 20px 40px; background: #900; color: white; border: 2px solid #fff; display: none; z-index: 150; font-weight: bold; border-radius: 15px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="closet-view"></div>
    <div id="ui"><div id="clock">12:00 AM</div><div id="alert">РАКЕТНАЯ ОПАСНОСТЬ! ВЫКЛЮЧИ СВЕТ!</div></div>
    
    <div id="move-zone"><div id="joy-bound"><div id="joy-stick"></div></div></div>
    <div id="look-zone"></div>
    <button id="action-btn" class="btn">ДЕЙСТВИЕ</button>

    <div id="overlay">
        <h1 id="over-title">КОНЕЦ</h1>
        <button onclick="location.reload()" style="padding:15px 40px; background:#fff; color:#000; border:none; font-weight:bold; border-radius:10px;">ЗАНОВО</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, monster, mainLight;
        let isHidden = false, gameActive = true, activeAnomaly = false, isLightOn = true;
        let moveJoy = {x:0, y:0}, rotY = 0;
        let timeLeft = 150, objects = {}, closetTimer = 0; // 150 сек = 5 часов по 30 сек

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            mainLight = new THREE.PointLight(0xffffff, 1.5, 50);
            mainLight.position.set(0, 5, 0); scene.add(mainLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));

            const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), new THREE.MeshPhongMaterial({color: 0x333333, side: THREE.BackSide}));
            scene.add(room);

            function createObj(w,h,d, x,y,z, col, name) {
                let m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color: col}));
                m.position.set(x,y,z); scene.add(m); objects[name] = m;
            }

            createObj(1.8, 4.5, 1.4, 4.1, -0.75, 0, 0x3d2b1f, 'ШКАФ');
            createObj(1.3, 0.9, 0.1, 0, 0, -4.95, 0x111111, 'ТВ');
            createObj(0.2, 0.4, 0.1, -4.95, 1, 0, 0xaaaaaa, 'ВЫКЛЮЧАТЕЛЬ');
            createObj(1.6, 3.6, 0.05, 0, -1, 4.95, 0x221100, 'ДВЕРЬ');

            monster = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.2, 0.4), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true}));
            monster.position.y = -10; scene.add(monster);

            camera.position.set(0, 0, 2);
            startTimer();
            setInterval(spawnAnomaly, 12000);
            animate();
        }

        function startTimer() {
            let t = setInterval(() => {
                if(!gameActive) return clearInterval(t);
                timeLeft--;
                // 30 сек = 1 час. 150 сек = 5 часов.
                let hoursPassed = Math.floor((150 - timeLeft) / 30);
                let h = 12 + hoursPassed;
                if(h > 12) h -= 12;
                document.getElementById('clock').innerText = `${h}:00 AM`;
                if(timeLeft <= 0) winGame();

                // Проверка сидения в шкафу
                if(isHidden) {
                    closetTimer++;
                    if(closetTimer > 15) die("ГЛИЧ НАШЕЛ ТЕБЯ В ШКАФУ! НЕЛЬЗЯ СИДЕТЬ ТАМ ДОЛГО!");
                } else {
                    closetTimer = 0;
                }
            }, 1000);
        }

        function spawnAnomaly() {
            if(!gameActive || activeAnomaly) return;
            activeAnomaly = true;
            let r = Math.random();
            let alertBox = document.getElementById('alert');
            
            if(r < 0.5) { 
                // КЛАССИКА: СТУК И ГЛИЧ
                alertBox.style.display = 'block';
                alertBox.innerText = "В ДВЕРЬ КТО-ТО СТУЧИТ...";
                alertBox.style.background = "rgba(0,0,0,0.7)";
                
                setTimeout(() => {
                    if(!gameActive) return;
                    monster.position.set(0, -0.5, 4);
                    setTimeout(() => {
                        if(!isHidden && gameActive) die("ГЛИЧ ЗАМЕТИЛ ТЕБЯ!");
                        else {
                            monster.position.y = -10; activeAnomaly = false; alertBox.style.display = 'none';
                        }
                    }, 5000);
                }, 5000);
            } else {
                // РАКЕТНАЯ ОПАСНОСТЬ
                alertBox.style.display = 'block';
                alertBox.innerText = "РАКЕТНАЯ ОПАСНОСТЬ! ВЫКЛЮЧИ СВЕТ!";
                alertBox.style.background = "rgba(255,0,0,0.8)";
                objects['ТВ'].material.color.set(0xff0000);

                setTimeout(() => {
                    if(isLightOn && gameActive) {
                        die("ВАС УБИЛА РАКЕТА! ДРОН ЗАМЕТИЛ СВЕТ В ОКНЕ!");
                    } else if(gameActive) {
                        // Спаслись
                        setTimeout(() => {
                            activeAnomaly = false;
                            alertBox.style.display = 'none';
                            objects['ТВ'].material.color.set(0x111111);
                        }, 2000);
                    }
                }, 5000);
            }
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            if(!isHidden) {
                let s = Math.sin(rotY), c = Math.cos(rotY);
                camera.position.x += (c * moveJoy.x - s * moveJoy.y) * 0.12;
                camera.position.z += (-s * moveJoy.x - c * moveJoy.y) * 0.12;
            }

            camera.position.x = Math.max(-4, Math.min(4, camera.position.x));
            camera.position.z = Math.max(-4, Math.min(4, camera.position.z));

            let btn = document.getElementById('action-btn');
            btn.style.display = 'none';

            // Логика шкафа
            if(camera.position.distanceTo(objects['ШКАФ'].position) < 2 && !isHidden) {
                btn.style.display = 'block'; btn.innerText = "ЗАЛЕЗТЬ В ШКАФ";
                btn.onclick = () => { isHidden = true; document.getElementById('closet-view').style.display = 'block'; camera.position.set(4, -1, 0); };
            } else if(isHidden) {
                btn.style.display = 'block'; btn.innerText = "ВЫЙТИ";
                btn.onclick = () => { isHidden = false; document.getElementById('closet-view').style.display = 'none'; camera.position.set(2.5, 0, 0); };
            }

            // Логика выключателя
            if(camera.position.distanceTo(objects['ВЫКЛЮЧАТЕЛЬ'].position) < 2 && !isHidden) {
                btn.style.display = 'block';
                btn.innerText = isLightOn ? "ВЫКЛЮЧИТЬ СВЕТ" : "ВКЛЮЧИТЬ СВЕТ";
                btn.onclick = () => {
                    isLightOn = !isLightOn;
                    mainLight.intensity = isLightOn ? 1.5 : 0.1;
                };
            }

            camera.rotation.set(0, rotY, 0);
            renderer.render(scene, camera);
        }

        let lastX;
        document.getElementById('look-zone').addEventListener('touchmove', (e) => {
            let t = e.touches[0];
            if(lastX) { rotY -= (t.clientX - lastX) * 0.008; }
            lastX = t.clientX;
        });
        document.getElementById('look-zone').addEventListener('touchend', () => { lastX = null; });

        const jBound = document.getElementById('joy-bound');
        const jStick = document.getElementById('joy-stick');
        document.getElementById('move-zone').addEventListener('touchstart', (e) => {
            let t = e.touches[0]; jBound.style.display = 'block';
            jBound.style.left = (t.clientX - 50) + 'px'; jBound.style.top = (t.clientY - 50) + 'px';
        });
        document.getElementById('move-zone').addEventListener('touchmove', (e) => {
            let t = e.touches[0], rect = jBound.getBoundingClientRect();
            let dx = (t.clientX - (rect.left + 50))/50, dy = (t.clientY - (rect.top + 50))/50;
            let d = Math.sqrt(dx*dx+dy*dy); if(d>1){dx/=d;dy/=d;}
            jStick.style.transform = `translate(${dx*25}px,${dy*25}px)`;
            moveJoy = {x: dx, y: -dy};
        });
        document.getElementById('move-zone').addEventListener('touchend', () => { jBound.style.display='none'; moveJoy={x:0,y:0}; });

        function die(msg) { gameActive = false; document.getElementById('overlay').style.display = 'flex'; document.getElementById('over-title').innerText = msg; }
        function winGame() { gameActive = false; document.getElementById('overlay').style.display = 'flex'; document.getElementById('over-title').innerText = "ТЫ ВЫЖИЛ ДО 5 УТРА!"; document.getElementById('over-title').style.color = "lime"; }

        init();
    </script>
</body>
        </html>
