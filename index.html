<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arenda 3D: Room Horror</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; z-index: 100; pointer-events: none; }
        #timer-bar { width: 200px; height: 10px; background: #333; display: none; margin-top: 5px; }
        #timer-fill { width: 100%; height: 100%; background: #f00; }
        #instructions { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
        #paper { background: #e0d8c0; padding: 20px; width: 80%; max-width: 400px; border: 2px solid #333; color: #000; }
        button { width: 100%; padding: 15px; background: #800; color: #fff; border: none; margin-top: 10px; font-weight: bold; }
        
        /* Джойстик */
        #joy-bound { position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 50; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        #action-msg { position: fixed; bottom: 160px; width: 100%; text-align: center; color: yellow; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="instructions">
        <div id="paper">
            <h2>ИНСТРУКЦИЯ</h2>
            <p>• ТВ включился / Стук? <b>Прячься в ШКАФ или в КРОВАТЬ</b> (подойди вплотную).</p>
            <p>• Свет погас? У тебя 10 сек резерва. Беги к <b>ЖЕЛТОМУ ЩИТКУ</b> на стене и жми "Починить".</p>
            <button id="start-btn">ПОЕХАЛИ</button>
        </div>
    </div>

    <div id="ui">
        <div id="status">Свет: ОК</div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
    </div>
    <div id="action-msg">НАЖМИ, ЧТОБЫ ПОЧИНИТЬ</div>

    <div id="joy-bound"><div id="joy-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mainLight, backupLight;
        let joyPos = {x:0, y:0}, isMoving = false, gameActive = false;
        let isBlackout = false, isHiding = false;
        let objects = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // СВЕТ
            mainLight = new THREE.PointLight(0xffffff, 1.2, 20);
            mainLight.position.set(0, 4, 0);
            scene.add(mainLight);
            
            backupLight = new THREE.PointLight(0xff0000, 0, 10);
            scene.add(backupLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));

            // КОМНАТА (Стены)
            const wallMat = new THREE.MeshPhongMaterial({color: 0x555555});
            const room = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 10), wallMat);
            room.material.side = THREE.BackSide;
            scene.add(room);

            // ПОЛ
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.MeshPhongMaterial({color:0x222222}));
            floor.rotation.x = -Math.PI/2; floor.position.y = -2.5; scene.add(floor);

            // ПРЕДМЕТЫ
            function createBox(w, h, d, x, y, z, color, name) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color}));
                mesh.position.set(x,y,z);
                scene.add(mesh);
                objects[name] = mesh;
                return mesh;
            }

            createBox(1.5, 0.8, 0.1, 0, -1, -4.9, 0x111111, 'tv'); // ТВ
            createBox(2, 0.1, 1, 0, -1.5, -4.5, 0x442200, 'table'); // Стол
            createBox(2, 1, 4, -3.5, -2, -2, 0x000044, 'bed'); // Кровать
            createBox(1.5, 4, 1, 4, -0.5, 2, 0x221100, 'closet'); // Шкаф
            createBox(0.4, 0.6, 0.1, -4.9, 0.5, 0, 0xffff00, 'breaker'); // Щиток (Желтый)
            
            // Дверь и Окно (просто плоские меши на стенах)
            createBox(1.5, 3, 0.1, 0, -1, 4.9, 0x332211, 'door');
            createBox(2, 2, 0.1, 4.9, 0.5, -1, 0x88ccff, 'window');

            camera.position.set(0, 0, 3);
            animate();
            
            setInterval(randomAnomaly, 15000); // Аномалии каждые 15 сек
        }

        function randomAnomaly() {
            if(!gameActive || isBlackout) return;
            const rand = Math.random();
            if(rand < 0.3) blackoutTrigger();
            else if(rand < 0.6) console.log("Стук в окно!");
            else console.log("ТВ включился!");
        }

        function blackoutTrigger() {
            isBlackout = true;
            mainLight.intensity = 0;
            backupLight.intensity = 1;
            document.getElementById('status').innerText = "РЕЗЕРВ: 10 сек!";
            document.getElementById('timer-bar').style.display = 'block';
            
            let timeLeft = 10;
            const timer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-fill').style.width = (timeLeft * 10) + "%";
                if(timeLeft <= 0 && isBlackout) {
                    clearInterval(timer);
                    gameOver("ТЫ НЕ УСПЕЛ ПОЧИНИТЬ СВЕТ...");
                }
                if(!isBlackout) clearInterval(timer);
            }, 100);
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            if (isMoving) {
                camera.position.x += joyPos.x * 0.07;
                camera.position.z += joyPos.y * 0.07;
            }
            
            // Ограничение камеры (чтобы не выходить сквозь стены)
            camera.position.x = Math.max(-4.5, Math.min(4.5, camera.position.x));
            camera.position.z = Math.max(-4.5, Math.min(4.5, camera.position.z));

            // Проверка близости к щитку
            let distToBreaker = camera.position.distanceTo(objects.breaker.position);
            if(isBlackout && distToBreaker < 1.5) {
                document.getElementById('action-msg').style.display = 'block';
                // Авто-починка при приближении (для теста)
                setTimeout(() => {
                    isBlackout = false;
                    mainLight.intensity = 1.2;
                    backupLight.intensity = 0;
                    document.getElementById('status').innerText = "Свет: ОК";
                    document.getElementById('timer-bar').style.display = 'none';
                    document.getElementById('action-msg').style.display = 'none';
                }, 2000);
            } else {
                document.getElementById('action-msg').style.display = 'none';
            }

            backupLight.position.copy(camera.position);
            renderer.render(scene, camera);
        }

        function gameOver(msg) {
            gameActive = false;
            alert(msg);
            location.reload();
        }

        const jBound = document.getElementById('joy-bound');
        const jStick = document.getElementById('joy-stick');
        jBound.addEventListener('touchstart', () => isMoving = true);
        jBound.addEventListener('touchmove', (e) => {
            const rect = jBound.getBoundingClientRect();
            const t = e.touches[0];
            let dx = (t.clientX - rect.left - 50) / 50;
            let dy = (t.clientY - rect.top - 50) / 50;
            jStick.style.transform = `translate(${dx*30}px, ${dy*30}px)`;
            joyPos.x = dx; joyPos.y = dy;
        });
        jBound.addEventListener('touchend', () => { isMoving = false; jStick.style.transform = 'translate(0,0)'; });

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('joy-bound').style.display = 'block';
            gameActive = true;
            init();
        };
    </script>
</body>
</html>
